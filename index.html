<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --yellow: #F7DE5A;

    --white: #ffffff;
    --gray-bg: #f5f5f3;
    --gray-border: rgba(0,0,0,0.1);
    --gray-text: #888;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--gray-bg);
    color: var(--black);
    padding: 32px 20px 80px;
  }
  .page-header {
    max-width: 1800px;
    margin: 0 auto 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .page-header h1 { font-size: 18px; font-weight: 600; }
  .page-header p { font-size: 12px; color: var(--gray-text); }

  .fixed-bar {
    max-width: 1800px;
    margin: 0 auto 16px;
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--gray-text);
  }
  .fixed-bar strong { color: var(--black); font-weight: 600; }
  .fixed-item { display: flex; gap: 5px; align-items: center; }
  .fixed-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; background: var(--gray-bg); border-radius: 3px; padding: 1px 5px; }

  .grid {
    max-width: 1800px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(10, minmax(0, 1fr));
    gap: 8px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    transition: opacity 0.15s, filter 0.15s;
  }
  .grid.has-focus .card { opacity: 0.15; filter: grayscale(0.4); }
  .grid.has-focus .card.focused { opacity: 1; filter: none; }

  .card-num {
    display: inline-block;
    font-size: 8px;
    font-weight: 700;
    background: var(--yellow);
    color: var(--black);
    border-radius: 3px;
    padding: 1px 6px;
    width: fit-content;
  }
  .card-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.4;
  }
  .card-divider { border: none; border-top: 1px solid var(--gray-border); }

  .row { font-size: 9px; line-height: 1.45; color: var(--gray-text); }
  .row b { color: var(--black); font-weight: 700; }

  @media (max-width: 1400px) { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (max-width: 800px) { .grid { grid-template-columns: repeat(3, 1fr); } }
</style>

const grid = document.getElementById('grid');

data.forEach((d, i) => {
  const num = String(i + 1).padStart(2, '0');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-num">${num}</span>
    <div class="card-title">${d.t}</div>
    <hr class="card-divider">
    <div class="row"><b>누가</b> ${d.who}</div>
    <div class="row"><b>어떻게</b> ${d.how}</div>
    <div class="row"><b>왜</b> ${d.why}</div>
  `;
  card.addEventListener('click', () => {
    if (card.classList.contains('focused')) {
      card.classList.remove('focused');
      grid.classList.remove('has-focus');
    } else {
      document.querySelectorAll('.card.focused').forEach(c => c.classList.remove('focused'));
      card.classList.add('focused');
      grid.classList.add('has-focus');
    }
  });
  grid.appendChild(card);
});

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemonderma SNS 기획</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #F7DE5A;
    --black: #1f1f1f;
    --white: #ffffff;
    --gray-bg: #f5f5f3;
    --gray-border: rgba(0,0,0,0.1);
    --gray-text: #888;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--gray-bg);
    color: var(--black);
    padding: 32px 20px 80px;
  }
  .page-header {
    max-width: 1800px;
    margin: 0 auto 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .page-header h1 { font-size: 18px; font-weight: 600; }
  .page-header p { font-size: 12px; color: var(--gray-text); }

  .fixed-bar {
    max-width: 1800px;
    margin: 0 auto 16px;
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--gray-text);
  }
  .fixed-bar strong { color: var(--black); font-weight: 600; }
  .fixed-item { display: flex; gap: 5px; align-items: center; }
  .fixed-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; background: var(--gray-bg); border-radius: 3px; padding: 1px 5px; }

  .grid {
    max-width: 1800px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(10, minmax(0, 1fr));
    gap: 8px;
  }
  #grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    transition: opacity 0.15s, filter 0.15s;
  }
  #grid .card {
    padding: 20px;
    gap: 10px;
    border-radius: 12px;
  }
  .grid.has-focus .card { opacity: 0.15; filter: grayscale(0.4); }
  .grid.has-focus .card.focused { opacity: 1; filter: none; }

  .card-num {
    display: inline-block;
    font-size: 8px;
    font-weight: 700;
    background: var(--yellow);
    color: var(--black);
    border-radius: 3px;
    padding: 1px 6px;
    width: fit-content;
  }
  #grid .card-num { font-size: 11px; padding: 2px 10px; border-radius: 4px; }
  .card-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.4;
  }
  #grid .card-title { font-size: 18px; }
  .card-divider { border: none; border-top: 1px solid var(--gray-border); }

  .row {
    font-size: 9px;
    line-height: 1.45;
    color: var(--gray-text);
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 4px;
  }
  .row b { color: var(--black); font-weight: 700; }
  #grid .row { font-size: 13px; line-height: 1.6; grid-template-columns: 52px 1fr; }

  .toggle-wrap {
    max-width: 1800px;
    margin: 32px auto 0;
  }
  .toggle-header {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 8px;
    padding: 12px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    user-select: none;
  }
  .toggle-header:hover { background: var(--gray-bg); }
  #toggleCount {
    font-size: 11px;
    font-weight: 400;
    color: var(--gray-text);
    background: var(--gray-bg);
    border-radius: 4px;
    padding: 2px 8px;
  }
  #toggleArrow { margin-left: auto; font-size: 11px; color: var(--gray-text); transition: transform 0.2s; }
  #toggleArrow.open { transform: rotate(180deg); }
  .toggle-header-sns { border-color: var(--yellow); background: #fffde8; }
  .toggle-header-sns:hover { background: #fff9c4; }
  #snsCount {
    font-size: 11px;
    font-weight: 400;
    color: var(--gray-text);
    background: var(--yellow);
    border-radius: 4px;
    padding: 2px 8px;
  }
  .fixed-row { color: var(--gray-text); }
  .fixed-row b { color: var(--gray-text); }
  #snsArrow { margin-left: auto; font-size: 11px; color: var(--gray-text); transition: transform 0.2s; }
  #snsArrow.open { transform: rotate(180deg); }

  @media (max-width: 1400px) { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (max-width: 800px) { .grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>

<div class="page-header">

const FEATURED = new Set([0,25,80,90]);
const SNS_PICKS = new Set([12,20,30,37,41,44,59,79,85,87]);

const mainGrid = document.getElementById('grid');
const hiddenGrid = document.getElementById('hiddenGrid');
const snsGrid = document.getElementById('snsGrid');
const toggleWrap = document.getElementById('toggleWrap');
const toggleBtn = document.getElementById('toggleBtn');
const toggleArrow = document.getElementById('toggleArrow');
const toggleCount = document.getElementById('toggleCount');
const snsWrap = document.getElementById('snsWrap');
const snsBtn = document.getElementById('snsBtn');
const snsArrow = document.getElementById('snsArrow');
const snsCount = document.getElementById('snsCount');

function makeCard(d, i, targetGrid) {
  const num = String(i + 1).padStart(2, '0');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-num">${num}</span>
    <div class="card-title">${d.t}</div>
    <hr class="card-divider">
    <div class="row"><b>누가</b><span>${d.who}</span></div>
    <div class="row fixed-row"><b>어디서</b><span>인스타그램에서</span></div>
    <div class="row fixed-row"><b>무엇을</b><span>레몬더마 세럼/크림을</span></div>
    <div class="row fixed-row"><b>언제</b><span>일주일에 5번 업로드</span></div>
    <div class="row"><b>어떻게</b><span>${d.how}</span></div>
    <div class="row"><b>왜</b><span>${d.why}</span></div>
  `;
  card.addEventListener('click', () => {
    const g = card.closest('.grid');
    if (card.classList.contains('focused')) {
      card.classList.remove('focused');
      g.classList.remove('has-focus');
    } else {
      g.querySelectorAll('.card.focused').forEach(c => c.classList.remove('focused'));
      card.classList.add('focused');
      g.classList.add('has-focus');
    }
  });
  targetGrid.appendChild(card);
}

let hiddenCount = 0;
data.forEach((d, i) => {
  if (FEATURED.has(i)) {
    makeCard(d, i, mainGrid);
  } else if (SNS_PICKS.has(i)) {
    makeCard(d, i, snsGrid);
  } else {
    makeCard(d, i, hiddenGrid);
    hiddenCount++;
  }
});

toggleCount.textContent = `${hiddenCount}개`;
toggleWrap.style.display = 'block';
snsCount.textContent = `${SNS_PICKS.size}개`;
snsWrap.style.display = 'block';

let open = false;
toggleBtn.addEventListener('click', () => {
  open = !open;
  hiddenGrid.style.display = open ? 'grid' : 'none';
  toggleArrow.classList.toggle('open', open);
  document.getElementById('toggleLabel').textContent = open ? '나머지 기획 접기' : '나머지 기획 보기';
});

let snsOpen = false;
snsBtn.addEventListener('click', () => {
  snsOpen = !snsOpen;
  snsGrid.style.display = snsOpen ? 'grid' : 'none';
  snsArrow.classList.toggle('open', snsOpen);
  document.getElementById('snsLabel').textContent = snsOpen ? 'SNS 게시글로 활용 접기' : 'SNS 게시글로 활용';
});
